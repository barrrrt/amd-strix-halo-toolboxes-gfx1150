name: gfx1150 Toolboxes Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-and-adapt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Configure Git User
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Sync toolboxes from kyuz0
      run: |
        git remote add upstream https://github.com/kyuz0/amd-strix-halo-toolboxes.git || true
        git fetch upstream main
        git checkout main
        git merge upstream/main --allow-unrelated-histories -m "Auto-sync from kyuz0"
        git checkout upstream/main -- toolboxes/
        git add toolboxes/
        git commit -m "Sync toolboxes from kyuz0" || echo "No changes"
        git push origin main

    - name: gfx1150 Anpassungen (1151 → 1150)
      run: |
        cd toolboxes
        for file in Dockerfile.*; do
          if [[ -f "$file" ]]; then
            sed -i 's/gfx1151/gfx1150/g' "$file"
            sed -i 's/1151/1150/g' "$file"
            echo "Angepasst: $file"
          fi
        done
        git add .
        git commit -m "gfx1150: 1151 → 1150 ersetzt" || echo "Keine Änderungen"
        git push origin main

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build & Push Images
      run: |
        cd toolboxes
        docker buildx create --use
        for file in Dockerfile.*; do
          if [[ -f "$file" ]]; then
            tag="barrrrt/amd-strix-halo-toolboxes-gfx1150:${file#Dockerfile.}"
            docker buildx build --platform linux/amd64 -f "$file" -t "$tag" --push .
            echo "Built: $tag"
          fi
        done
