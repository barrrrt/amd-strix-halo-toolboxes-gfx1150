name: Sync kyuz0 Repo
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT }}
        fetch-depth: 0
    - name: Sync Upstream
      run: |
        git config --global user.name "Auto Sync"
        git config --global user.email "bot@github.com"
        git remote remove upstream || true
        git remote add upstream https://github.com/kyuz0/amd-strix-halo-toolboxes.git
        git fetch upstream main
        git checkout main
        git merge upstream/main --allow-unrelated-histories -m "Auto-sync from kyuz0"
        git push origin main
