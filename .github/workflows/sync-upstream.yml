name: Sync kyuz0 Upstream
on:
  schedule:
    - cron: '0 8 * * *'  # Täglich 8 Uhr
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # ✅ GITHUB_TOKEN statt PAT
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"  # ✅ Lokal, nicht global
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Sync Upstream
      run: |
        git remote remove upstream || true
        git remote add upstream https://github.com/kyuz0/amd-strix-halo-toolboxes.git
        git fetch upstream main
        git checkout main
        git merge upstream/main --allow-unrelated-histories -m "Auto-sync from kyuz0"
        git push origin main
