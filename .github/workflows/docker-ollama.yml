name: Build and Push Ollama Variant

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile.ollama
      - .github/workflows/docker-ollama.yml

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Ollama image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ollama
          push: true
          tags: |
            barrrrt/amd-strix-halo-toolboxes-gfx1150:rocm7-nightlies-ollama
            barrrrt/amd-strix-halo-toolboxes-gfx1150:rocm7-nightlies-ollama-latest
            barrrrt/amd-strix-halo-toolboxes-gfx1150:rocm7-nightlies-ollama-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
